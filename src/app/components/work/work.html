<div class="experience">
  <div class="experience__item" [class.current-job]="job().isCurrent">
    <app-svg-icon [type]="job().logo" class="experience__logo" />
    <div class="experience__details">
      <div>{{ job().role }}</div>
      <p>{{ job().company }} | {{ job().period }}</p>
    </div>
  </div>

  @if (job().summary) {
    <p class="experience__summary">{{ job().summary }}</p>
  }

  @if (job().descriptionPoints?.length) {
    <ul class="experience__description">
      @for (point of job().descriptionPoints; track $index) {
        <li [innerHTML]="point"></li>
      }
    </ul>
  }

  @if (job().techStack?.length) {
    <div class="experience__tech-stack">
      @for (tech of job().techStack; track $index) {
        <app-chip [label]="tech" />
      }
    </div>
  }
</div>
