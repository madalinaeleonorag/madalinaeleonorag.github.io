<button
  type="button"
  cdkOverlayOrigin
  #trigger="cdkOverlayOrigin"
  (click)="isOpen.set(!isOpen())"
  class="lib-select-trigger"
  [class.is-open]="isOpen()"
>
  <span>{{ value() || placeholder() }}</span>
  <span class="chevron">▼</span>
</button>

<ng-template
  cdkConnectedOverlay
  [cdkConnectedOverlayOrigin]="trigger"
  [cdkConnectedOverlayOpen]="isOpen()"
  [cdkConnectedOverlayHasBackdrop]="true"
  cdkConnectedOverlayBackdropClass="cdk-overlay-transparent-backdrop"
  (backdropClick)="isOpen.set(false)"
>
  <div class="lib-select-panel">
    <div class="lib-option clear-option" (click)="selectOption('')">
      {{ placeholder() }}
    </div>

    @for (option of options(); track option) {
      <div class="lib-option" [class.selected]="option === value()" (click)="selectOption(option)">
        {{ option }}
      </div>
    }
  </div>
</ng-template>
