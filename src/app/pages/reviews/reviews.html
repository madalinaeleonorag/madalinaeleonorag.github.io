<div class="filters">
  <div class="filter-group">
    <label>Keyword Search</label>
    <input
      type="text"
      class="custom-input"
      placeholder="Search reviews..."
      [ngModel]="searchTerm()"
      (ngModelChange)="searchTerm.set($event)"
    />
  </div>

  <div class="filter-group">
    <label>Role / Position</label>
    <lib-select
      placeholder="All Positions"
      [options]="availablePositions()"
      [value]="selectedPosition()"
      (valueChange)="selectedPosition.set($event)"
    >
    </lib-select>
  </div>

  <div class="filter-group">
    <label>Company</label>
    <lib-select
      placeholder="All Companies"
      [options]="availableCompanies()"
      [value]="selectedCompany()"
      (valueChange)="selectedCompany.set($event)"
    >
    </lib-select>
  </div>

  <div class="filter-group">
    <label>From Date</label>
    <input
      type="date"
      class="custom-input"
      [ngModel]="startDate()"
      (ngModelChange)="startDate.set($event)"
    />
  </div>

  <div class="filter-group">
    <label>To Date</label>
    <input
      type="date"
      class="custom-input"
      [ngModel]="endDate()"
      (ngModelChange)="endDate.set($event)"
    />
  </div>
</div>

<p>{{ filteredReviews().length }} reviews out of {{ ALL_REVIEWS.length }} total</p>

<div class="reviews-wrapper">
  @for (review of filteredReviews(); track $index) {
    <div class="glass-card">
      <div class="quote-text" [innerHTML]="review.review"></div>

      <div class="author-info">
        <span class="author-name">{{ review.reviewer }}</span>
        <span>&nbsp;&#45;&nbsp;{{ review.position }} &#64; {{ review.company }}</span
        ><span class="review-date">{{ review.date | date: 'mediumDate' }}</span>
      </div>
    </div>
  }
</div>
